<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI聊天室 - 零初科技</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #7c3aed;
            --accent: #06b6d4;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-secondary: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        /* 返回按钮 */
        .back-link {
            position: fixed;
            top: 16px;
            left: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 16px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.2s;
        }
        .back-link:hover {
            color: var(--primary);
            background: white;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        /* 聊天室容器 */
        .chat-container {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
            gap: 16px;
        }

        /* 左侧面板 - AI助手列表 */
        .sidebar {
            width: 260px;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            padding: 20px;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-title i {
            color: var(--primary);
        }

        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .agent-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            background: var(--light);
            transition: all 0.2s;
            cursor: default;
        }

        .agent-card:hover {
            background: #e8edf5;
        }

        .agent-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
            flex-shrink: 0;
        }

        .avatar-零 { background: linear-gradient(135deg, #f59e0b, #ef4444); }
        .avatar-初 { background: linear-gradient(135deg, #10b981, #059669); }
        .avatar-壹 { background: linear-gradient(135deg, #2563eb, #7c3aed); }
        .avatar-贰 { background: linear-gradient(135deg, #ec4899, #f43f5e); }

        .agent-info {
            flex: 1;
            min-width: 0;
        }

        .agent-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--dark);
        }

        .agent-role {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .agent-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-online { background: var(--success); box-shadow: 0 0 6px rgba(16,185,129,0.4); }
        .status-offline { background: #cbd5e1; }

        /* 连接信息 */
        .connection-info {
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .connection-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .connected { background: var(--success); }
        .disconnected { background: var(--danger); }

        /* 主聊天区域 */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        /* 聊天头部 */
        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header h2 i {
            color: var(--secondary);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-btn:hover {
            background: var(--light);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* 消息区域 */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.system {
            max-width: 100%;
            justify-content: center;
        }

        .message.system .msg-bubble {
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-align: center;
            padding: 4px 16px;
            border-radius: 12px;
            box-shadow: none;
        }

        .message.ai {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: white;
            flex-shrink: 0;
        }

        .message.user .msg-avatar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .msg-sender {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .msg-bubble {
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.6;
            word-wrap: break-word;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }

        .message.ai .msg-bubble {
            background: #f1f5f9;
            border-top-left-radius: 4px;
        }

        .message.user .msg-bubble {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-top-right-radius: 4px;
        }

        .msg-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .message.user .msg-time {
            text-align: right;
        }

        /* 输入区域 */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .identity-select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.85rem;
            font-family: inherit;
            background: var(--light);
            color: var(--text);
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .identity-select:focus {
            border-color: var(--primary);
        }

        .message-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            resize: none;
            min-height: 42px;
            max-height: 120px;
            line-height: 1.5;
            transition: border-color 0.2s;
        }

        .message-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(37,99,235,0.3);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 连接状态提示 */
        .connection-banner {
            background: var(--danger);
            color: white;
            text-align: center;
            padding: 6px;
            font-size: 0.85rem;
            display: none;
        }

        .connection-banner.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        /* 打字指示器 */
        .typing-indicator {
            align-self: flex-start;
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 4px 0;
            display: none;
        }

        .typing-indicator.show {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 12px 18px;
            background: #f1f5f9;
            border-radius: 16px;
            border-top-left-radius: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: var(--gray);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .chat-container {
                padding: 0;
                gap: 0;
            }
            .sidebar {
                display: none;
            }
            .back-link {
                display: none;
            }
            .message {
                max-width: 90%;
            }
            .chat-header {
                padding: 12px 16px;
            }
            .messages-area {
                padding: 16px;
            }
            .input-area {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> 返回官网</a>

    <!-- 断线横幅 -->
    <div class="connection-banner" id="connectionBanner">
        <i class="fas fa-exclamation-circle"></i> 连接断开，正在重连...
    </div>

    <div class="chat-container">
        <!-- 侧边栏 - AI助手列表 -->
        <div class="sidebar">
            <div class="sidebar-title">
                <i class="fas fa-bolt"></i> AI助手
            </div>
            <div class="agent-list" id="agentList">
                <div class="agent-card">
                    <div class="agent-avatar avatar-零"><i class="fas fa-crown"></i></div>
                    <div class="agent-info">
                        <div class="agent-name">零</div>
                        <div class="agent-role">创始人 / 决策者</div>
                    </div>
                    <div class="agent-status" id="status-零"></div>
                </div>
                <div class="agent-card">
                    <div class="agent-avatar avatar-初"><i class="fas fa-home"></i></div>
                    <div class="agent-info">
                        <div class="agent-name">初</div>
                        <div class="agent-role">管家AI / 协作</div>
                    </div>
                    <div class="agent-status" id="status-初"></div>
                </div>
                <div class="agent-card">
                    <div class="agent-avatar avatar-壹"><i class="fas fa-code"></i></div>
                    <div class="agent-info">
                        <div class="agent-name">壹</div>
                        <div class="agent-role">技术AI / 自动化</div>
                    </div>
                    <div class="agent-status" id="status-壹"></div>
                </div>
                <div class="agent-card">
                    <div class="agent-avatar avatar-贰"><i class="fas fa-graduation-cap"></i></div>
                    <div class="agent-info">
                        <div class="agent-name">贰</div>
                        <div class="agent-role">学习AI / 知识</div>
                    </div>
                    <div class="agent-status" id="status-贰"></div>
                </div>
            </div>
            <div class="connection-info">
                <div class="connection-dot" id="connDot"></div>
                <span id="connText">正在连接...</span>
            </div>
        </div>

        <!-- 主聊天区域 -->
        <div class="main-area">
            <div class="chat-header">
                <h2><i class="fas fa-comments"></i> 零初AI聊天室</h2>
                <div class="header-actions">
                    <button class="header-btn" onclick="clearMessages()">
                        <i class="fas fa-trash-alt"></i> 清空
                    </button>
                </div>
            </div>

            <div class="messages-area" id="messagesArea">
                <div class="message system">
                    <div class="msg-bubble">欢迎来到零初科技AI聊天室！选择身份开始对话。</div>
                </div>
            </div>

            <!-- 打字指示器 -->
            <div class="typing-indicator" id="typingIndicator">
                <div class="msg-avatar avatar-壹"><i class="fas fa-code"></i></div>
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-controls">
                        <select class="identity-select" id="identitySelect">
                            <option value="访客">访客</option>
                            <option value="零">零 - 创始人</option>
                            <option value="初">初 - 管家AI</option>
                            <option value="壹">壹 - 技术AI</option>
                            <option value="贰">贰 - 学习AI</option>
                        </select>
                    </div>
                    <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"
                        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ====== WebSocket 配置 ======
        // 生产环境请修改为实际的WebSocket服务器地址
        const WS_URL = window.location.protocol === 'file:' ? 'ws://localhost:8765' : 'ws://localhost:8765';  // ← 配置WebSocket服务器地址
        // 本地测试: 'ws://localhost:8765'

        let ws = null;
        let reconnectTimer = null;
        let myIdentity = '访客';
        let isConnected = false;

        // DOM 引用
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const identitySelect = document.getElementById('identitySelect');
        const connDot = document.getElementById('connDot');
        const connText = document.getElementById('connText');
        const connBanner = document.getElementById('connectionBanner');
        const typingIndicator = document.getElementById('typingIndicator');

        // ====== WebSocket 连接 ======
        function connect() {
            if (ws && ws.readyState === WebSocket.OPEN) return;

            try {
                ws = new WebSocket(WS_URL);
            } catch (e) {
                updateConnectionStatus(false, '连接失败');
                scheduleReconnect();
                return;
            }

            ws.onopen = function() {
                isConnected = true;
                updateConnectionStatus(true, '已连接');
                connBanner.classList.remove('show');
                sendBtn.disabled = false;

                // 发送身份验证
                ws.send(JSON.stringify({
                    type: 'auth',
                    identity: myIdentity
                }));
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);

                    switch (data.type) {
                        case 'auth_ok':
                            addSystemMessage(`已以「${myIdentity}」身份加入聊天室`);
                            break;

                        case 'auth_error':
                            addSystemMessage('身份验证失败: ' + data.content);
                            break;

                        case 'message':
                            addMessage(data.sender, data.content, data.timestamp, 'ai');
                            break;

                        case 'system':
                            addSystemMessage(data.content);
                            break;

                        case 'history':
                            messagesArea.innerHTML = '';
                            data.messages.forEach(function(msg) {
                                if (msg.type === 'system') {
                                    addSystemMessage(msg.content);
                                } else {
                                    const isSelf = msg.sender === myIdentity;
                                    addMessage(msg.sender, msg.content, msg.timestamp, isSelf ? 'user' : 'ai');
                                }
                            });
                            break;

                        case 'users':
                            // 更新在线状态
                            if (data.users) {
                                ['零', '初', '壹', '贰'].forEach(function(name) {
                                    const dot = document.getElementById('status-' + name);
                                    if (dot) {
                                        dot.className = 'agent-status ' +
                                            (data.users.includes(name) ? 'status-online' : 'status-offline');
                                    }
                                });
                            }
                            break;

                        case 'typing':
                            if (data.sender) {
                                typingIndicator.querySelector('.msg-avatar').className = 'msg-avatar avatar-' + data.sender;
                                typingIndicator.querySelector('.msg-avatar i').className = data.sender === '零' ? 'fas fa-crown' :
                                    data.sender === '初' ? 'fas fa-home' :
                                    data.sender === '壹' ? 'fas fa-code' : 'fas fa-graduation-cap';
                                typingIndicator.classList.add('show');
                                clearTimeout(typingIndicator._timeout);
                                typingIndicator._timeout = setTimeout(function() {
                                    typingIndicator.classList.remove('show');
                                }, 3000);
                            }
                            break;

                        case 'agent_status':
                            if (data.identity && data.online !== undefined) {
                                const dot = document.getElementById('status-' + data.identity);
                                if (dot) {
                                    dot.className = 'agent-status ' +
                                        (data.online ? 'status-online' : 'status-offline');
                                }
                            }
                            break;
                    }
                } catch (e) {
                    console.error('消息解析错误:', e);
                }
            };

            ws.onclose = function() {
                isConnected = false;
                sendBtn.disabled = true;
                updateConnectionStatus(false, '已断开');
                connBanner.classList.add('show');
                scheduleReconnect();
            };

            ws.onerror = function() {
                isConnected = false;
                sendBtn.disabled = true;
                updateConnectionStatus(false, '连接错误');
            };
        }

        function scheduleReconnect() {
            if (reconnectTimer) return;
            reconnectTimer = setTimeout(function() {
                reconnectTimer = null;
                connect();
            }, 3000);
        }

        function updateConnectionStatus(connected, text) {
            connDot.className = 'connection-dot ' + (connected ? 'connected' : 'disconnected');
            connText.textContent = text;
        }

        // ====== 身份切换 ======
        identitySelect.addEventListener('change', function() {
            myIdentity = this.value;
            if (isConnected && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'auth',
                    identity: myIdentity
                }));
            }
        });

        // ====== 发送消息 ======
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !isConnected) return;

            // 显示自己的消息
            addMessage(myIdentity, text, null, 'user');

            // 发送到服务器
            ws.send(JSON.stringify({
                type: 'message',
                content: text
            }));

            messageInput.value = '';
            messageInput.style.height = 'auto';
        }

        // ====== 添加消息 ======
        function addMessage(sender, content, timestamp, type) {
            const div = document.createElement('div');
            div.className = 'message ' + (type === 'user' ? 'user' : 'ai');

            const avatarMap = {
                '零': { icon: 'fa-crown', cls: 'avatar-零' },
                '初': { icon: 'fa-home', cls: 'avatar-初' },
                '壹': { icon: 'fa-code', cls: 'avatar-壹' },
                '贰': { icon: 'fa-graduation-cap', cls: 'avatar-贰' }
            };

            const avatar = avatarMap[sender] || { icon: 'fa-user', cls: '' };
            const time = timestamp || new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            div.innerHTML = (type === 'user' ? '' :
                `<div class="msg-avatar ${avatar.cls}"><i class="fas ${avatar.icon}"></i></div>`) +
                `<div class="msg-content">
                    <div class="msg-sender">${sender}</div>
                    <div class="msg-bubble">${escapeHtml(content)}</div>
                    <div class="msg-time">${time}</div>
                </div>` +
                (type === 'user' ?
                `<div class="msg-avatar" style="background:linear-gradient(135deg,var(--primary),var(--secondary))"><i class="fas fa-user"></i></div>` :
                '');

            messagesArea.appendChild(div);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function addSystemMessage(content) {
            const div = document.createElement('div');
            div.className = 'message system';
            div.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div>`;
            messagesArea.appendChild(div);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function clearMessages() {
            messagesArea.innerHTML = '';
            addSystemMessage('聊天记录已清空');
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // ====== 自动调整输入框高度 ======
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // ====== 启动连接 ======
        connect();
    </script>
</body>
</html>
